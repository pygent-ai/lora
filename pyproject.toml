[project]
name = "lora"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "pygent-ai==0.1.5",
]

[project.scripts]
lora = "lora.cli:main"

[build-system]
